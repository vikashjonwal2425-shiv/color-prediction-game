<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Game - History Mode</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .timer-card { background: #222; padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .btn-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 15px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; flex: 1; }
        .red { background: #ff4444; } .green { background: #00c853; } .violet { background: #aa00ff; }
        
        /* रिकॉर्ड टेबल स्टाइल */
        .history-section { margin-top: 30px; background: #1a1a1a; border-radius: 10px; padding: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 10px; border-bottom: 1px solid #333; }
        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>

    <div style="display:flex; justify-content:space-between; padding:10px; background:#333; border-radius:10px; margin-bottom:10px;">
        <span>User: Vikash</span>
        <span>Balance: ₹<span id="balance">1000</span></span>
    </div>

    <div class="timer-card">
        <h2 id="timer">00:30</h2>
        <p>Period: <span id="period">---</span></p>
    </div>

    <div class="btn-row">
        <button class="btn green" onclick="bet('green')">Green</button>
        <button class="btn violet" onclick="bet('violet')">Violet</button>
        <button class="btn red" onclick="bet('red')">Red</button>
    </div>

    <div class="history-section">
        <h3>पिछले 30 रिकॉर्ड (Record)</h3>
        <table>
            <thead>
                <tr>
                    <th>Period</th>
                    <th>Number</th>
                    <th>Result</th>
                </tr>
            </thead>
            <tbody id="history-body">
                </tbody>
        </table>
    </div>

    <script>
        let timeLeft = 30;

        // हर 1 सेकंड में टाइमर अपडेट करना
        setInterval(() => {
            if (timeLeft <= 0) {
                timeLeft = 30;
                refreshGame(); // रिजल्ट फेच करो
            }
            timeLeft--;
            document.getElementById('timer').innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
        }, 1000);

        async function refreshGame() {
            try {
                const res = await fetch('/api/result');
                const data = await res.json();
                
                // पीरियड अपडेट करें
                if(data.latest) document.getElementById('period').innerText = data.latest.period;

                // टेबल अपडेट करें
                const tableBody = document.getElementById('history-body');
                tableBody.innerHTML = ""; // पुरानी लिस्ट साफ करें

                data.history.forEach(item => {
                    const colorCircle = `<span class="dot" style="background:${item.winning_color}"></span>`;
                    tableBody.innerHTML += `
                        <tr>
                            <td>${item.period}</td>
                            <td>${item.winning_number}</td>
                            <td>${colorCircle}</td>
                        </tr>
                    `;
                });
            } catch (e) { console.log("डेटा नहीं मिल रहा..."); }
        }

        // पहली बार लोड होने पर
        refreshGame();

        function bet(c) {
            alert(c + " पर बेट लग गई! (API से जुड़ने के लिए रिचार्ज करें)");
        }
    </script>
</body>
</html>
